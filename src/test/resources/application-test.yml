spring:
  datasource:
    url: jdbc:h2:mem:trymily;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
        integration:
          envers:
            enabled: false


  flyway:
    enabled: false # Disable Flyway for H2 tests since it contains Postgres-specific SQL

