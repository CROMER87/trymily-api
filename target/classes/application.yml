spring:
  application:
    name: trymily-api
  
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${GOOGLE_ISSUER_URI:https://accounts.google.com}
          jwk-set-uri: ${GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:super-secret-key-change-this-in-production-2026-trymily}
      expiration-hours: ${JWT_EXPIRATION_HOURS:24}

logging:
  level:
    com.trymily: DEBUG
    org.springframework.security: DEBUG
