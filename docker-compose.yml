services:
  api:
    build: .
    container_name: trymily-api
    network_mode: host
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:postgresql://localhost:5432/trymily}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-mero}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: dev
      GOOGLE_ISSUER_URI: ${GOOGLE_ISSUER_URI:-https://accounts.google.com}
      GOOGLE_JWK_SET_URI: ${GOOGLE_JWK_SET_URI:-https://www.googleapis.com/oauth2/v3/certs}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-this-in-production-2026-trymily}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
